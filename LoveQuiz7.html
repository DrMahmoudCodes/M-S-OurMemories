<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الحب    ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان رومانسية دافئة */
            --primary-color: #d63384; /* وردي غامق */
            --secondary-color: #ff6b6b; /* أحمر ناعم */
            --accent-color: #6610f2; /* بنفسجي */
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #4a148c; /* بنفسجي غامق للنصوص */
            --shadow: 0 15px 35px rgba(214, 51, 132, 0.25);
            --radius: 25px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-image: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
        }

        /* تأثيرات الخلفية المتحركة */
        body::before {
            content: '❤️ 💕 💖 💗 💓';
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            font-size: 20px;
            opacity: 0.5;
            animation: floatHearts 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes floatHearts {
            0% { transform: translateY(-10px) translateX(0); }
            100% { transform: translateY(110vh) translateX(20px); }
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            min-height: 650px;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        /* الهيدر الرومانسي */
        header {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-weight: 900;
            font-size: 1.6rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* الشاشات */
        .screen {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.4s ease;
        }

        .hidden {
            display: none !important;
        }

        .big-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* المدخلات */
        .input-group {
            width: 100%;
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #f8d7da;
            border-radius: 15px;
            font-size: 1.1rem;
            background: #fff0f3;
            transition: 0.3s;
            outline: none;
            color: var(--text-color);
            font-weight: bold;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(214, 51, 132, 0.15);
            background: white;
        }

        /* الأزرار */
        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            font-weight: 800;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s;
        }

        .btn:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(214, 51, 132, 0.5);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* منطقة اللعب */
        .game-header {
            width: 100%;
            margin-bottom: 25px;
            background: #fff0f6;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffc2d1;
        }

        .mode-badge {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .player-name-display {
            font-size: 1.6rem;
            font-weight: 900;
            background: -webkit-linear-gradient(var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 35px;
            line-height: 1.4;
            color: #333;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }

        .option-btn {
            background: white;
            border: 2px solid #ffdde1;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 700;
            color: #555;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background: #fff0f3;
            transform: translateY(-2px);
            color: var(--primary-color);
        }

        .option-btn.correct {
            background: var(--correct-color);
            border-color: var(--correct-color);
            color: white;
            animation: pop 0.3s;
        }

        .option-btn.wrong {
            background: var(--wrong-color);
            border-color: var(--wrong-color);
            color: white;
            opacity: 0.85;
        }
        
        .option-btn.reveal-correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
            font-weight: bold;
        }

        @keyframes pop {
            50% { transform: scale(1.05); }
        }

        /* شاشة التمرير */
        .pass-device-screen {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
        }

        .pass-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        /* النتائج */
        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: 5px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: 900;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: var(--primary-color);
        }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            margin-bottom: 15px;
            text-align: right;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #ffdde1;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .final-msg {
            font-size: 1.3rem;
            color: #555;
            margin: 25px 0;
            line-height: 1.6;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 20;
        }

        .progress-bar {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--secondary-color);
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- شاشة البداية -->
    <div id="startScreen" class="screen">
        <div class="big-icon">💘</div>
        <h2 style="font-size: 2rem; margin-bottom: 10px; color: var(--primary-color);">اختبار الحب </h2>
        <p style="color:#666; margin-bottom:30px;">مدى معرفتكما ببعضكما البعض... جاوب بصراحةوواقعية</p>
        
        <div class="input-group">
            <label>اسم الطرف الأول:</label>
            <input type="text" id="p1Name" placeholder="اكتب الاسم هنا...">
        </div>
        
        <div class="input-group">
            <label>اسم الطرف الثاني:</label>
            <input type="text" id="p2Name" placeholder="اكتب الاسم هنا...">
        </div>

        <button class="btn" onclick="goToPhase1()">نبدأ المغامرة 💕</button>
    </div>

    <!-- شاشة اللعب -->
    <div id="gameScreen" class="screen hidden">
        <div class="game-header">
            <span class="mode-badge" id="modeBadge">وضع السرية 🔒</span>
            <div class="player-name-display" id="currentPlayerDisplay">الاسم</div>
            <div style="font-size: 0.95rem; color: #777; margin-top:8px; font-weight:bold;" id="instructionText">اختر إجابتك الحقيقية ولا يراك أحد</div>
        </div>

        <div class="question-text" id="questionText">السؤال؟</div>
        <div class="options-grid" id="optionsContainer"></div>
    </div>

    <!-- شاشة تمرير الجهاز -->
    <div id="transitionScreen" class="screen hidden pass-device-screen">
        <div class="pass-icon">📱❤️</div>
        <h2>توقف لحظة!</h2>
        <p style="font-size: 1.3rem; margin: 25px 0;" id="transitionText">مرر الجهاز للطرف الآخر الآن</p>
        <button class="btn" style="background: white; color: var(--accent-color);" onclick="nextPhase()">أنا جاهز/ة</button>
    </div>

    <!-- شاشة النتائج -->
    <div id="resultScreen" class="screen hidden">
        <div class="big-icon">🏆</div>
        <h2>نتيجة </h2>
        
        <div class="score-circle" id="winnerIcon">🤝</div>

        <div class="result-card">
            <div class="result-row">
                <span id="resP1Name">الشخص 1</span>
                <span style="color:var(--primary-color)" id="resP1Score">0 نقطة</span>
            </div>
            <div class="result-row">
                <span id="resP2Name">الشخص 2</span>
                <span style="color:var(--primary-color)" id="resP2Score">0 نقطة</span>
            </div>
        </div>

        <p class="final-msg" id="winnerText">التعادل!</p>
        
        <button class="btn" onclick="location.reload()">إعادة اختبار الحب</button>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<script>
    // --- قاعدة البيانات (أسئلة جريئة وواقعية) ---
    const questions = [
        { q: "ما هو الطبق المفضل لديك؟", options: ["بيتزا / برجر", "أكلات شرقية", "أكلات بحرية", "سلطات وصحي"] },
        { q: "لو كان بإمكانك السفر الآن، أين تذهب؟", options: ["أوروبا", "جزر المالديف", "مكة والمدينة", "اليابان"] },
        { q: "ما هو أكثر شيء يضايقك؟", options: ["الكذب", "التأخير", "الضوضاء", "التدخل في الخصوصية"] },
        { q: "كيف تقضي وقت فراغك المثالي؟", options: ["نوم", "قراءة / أفلام", "رياضة", "خروج مع أصدقاء"] },
        { q: "ما هي هديتك المثالية؟", options: ["مجوهرات", "مال", "سفر", "هدايا بسيطة معبرة"] },
        { q: "ما هو فيلمك المفضل؟", options: ["أكشن", "رومانسي", "كوميدي", "رعب"] },
        { q: "ما هو شعورك تجاه الأطفال؟", options: ["أحبهم جداً", "ممتازون ولكن بالتدريج", "لا أحب الضجيج", "لا أريدهم حالياً"] },
        { q: "من يتخذ القرارات المالية الكبرى؟", options: ["أنا", "شريكي", "نحن نتشارك", "حسب الموقف"] },
        { q: "ما هي سيارتك الحلم؟", options: ["مرسيدس / بي إم دبليو", "تويوتا / هوندا", "جيب / ربع نقل", "سيارة كهربائية"] },
        { q: "كيف تصف طريقتك في النوم؟", options: ["نوم عميق مبكر", "سهرة طوال الليل", "نوم متقطع", "أحتاج لأكثر من وسادة"] }
    ];

    // --- حالة اللعبة ---
    let state = {
        p1Name: "",
        p2Name: "",
        p1Answers: [], 
        p2Answers: [], 
        p1Score: 0,
        p2Score: 0,
        phase: 0, 
        currentQuestionIndex: 0
    };

    // --- DOM Elements ---
    const screens = {
        start: document.getElementById('startScreen'),
        game: document.getElementById('gameScreen'),
        transition: document.getElementById('transitionScreen'),
        result: document.getElementById('resultScreen')
    };

    const ui = {
        p1Input: document.getElementById('p1Name'),
        p2Input: document.getElementById('p2Name'),
        modeBadge: document.getElementById('modeBadge'),
        playerDisplay: document.getElementById('currentPlayerDisplay'),
        instruction: document.getElementById('instructionText'),
        questionText: document.getElementById('questionText'),
        optionsContainer: document.getElementById('optionsContainer'),
        transitionText: document.getElementById('transitionText'),
        progressBar: document.getElementById('progressBar'),
        winnerIcon: document.getElementById('winnerIcon')
    };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.add('hidden'));
        screens[screenName].classList.remove('hidden');
    }

    function goToPhase1() {
        const n1 = ui.p1Input.value.trim();
        const n2 = ui.p2Input.value.trim();

        if (!n1 || !n2) {
            alert("لنبدأ الرحلة! يرجى كتابة اسمي الطرفين 💕");
            return;
        }

        state.p1Name = n1;
        state.p2Name = n2;
        state.phase = 1;
        state.currentQuestionIndex = 0;
        
        setupGameUI("وضع السرية 🔒", state.p1Name, "اختر إجابتك الحقيقية بصدق، لا أحد يراك");
        showScreen('game');
        renderQuestion(false);
    }

    function handleOptionClick(selectedIndex) {
        const isGuessing = (state.phase === 3 || state.phase === 7);
        
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if (!isGuessing) {
            // تسجيل الإجابة
            const currentArray = (state.phase === 1) ? state.p1Answers : state.p2Answers;
            currentArray.push(selectedIndex);

            btns[selectedIndex].style.background = 'var(--primary-color)';
            btns[selectedIndex].style.color = 'white';
            btns[selectedIndex].style.borderColor = 'var(--primary-color)';

            setTimeout(() => {
                nextQuestionInPhase();
            }, 600);

        } else {
            // التخمين
            let correctAnswers = [];
            let guesserScoreVar = null;

            if (state.phase === 3) {
                correctAnswers = state.p1Answers;
                guesserScoreVar = "p2Score";
            } else {
                correctAnswers = state.p2Answers;
                guesserScoreVar = "p1Score";
            }

            const correctIndex = correctAnswers[state.currentQuestionIndex];
            const isCorrect = (selectedIndex === correctIndex);

            if (isCorrect) {
                btns[selectedIndex].classList.add('correct');
                state[guesserScoreVar] += 10;
            } else {
                btns[selectedIndex].classList.add('wrong');
                btns[correctIndex].classList.add('reveal-correct');
            }

            setTimeout(() => {
                nextQuestionInPhase();
            }, 1800);
        }
    }

    function nextQuestionInPhase() {
        state.currentQuestionIndex++;
        updateProgress();

        if (state.currentQuestionIndex < questions.length) {
            renderQuestion(state.phase === 3 || state.phase === 7);
        } else {
            proceedToNextPhase();
        }
    }

    function proceedToNextPhase() {
        state.currentQuestionIndex = 0;
        state.phase++;

        if (state.phase === 2) {
            ui.transitionText.innerHTML = `حسناً ${state.p1Name}، أنجزت!<br>مرر الجهاز لـ ${state.p2Name} ليخمن أسرارك.`;
            showScreen('transition');
        } 
        else if (state.phase === 4) {
             ui.transitionText.innerHTML = `الآن دور ${state.p2Name}<br>ليسجل إجاباته الحقيقية بسرية.`;
            showScreen('transition');
        }
        else if (state.phase === 6) {
             ui.transitionText.innerHTML = `ممتاز ${state.p2Name}!<br>مرر الجهاز لـ ${state.p1Name} ليخمن أسرارك.`;
            showScreen('transition');
        }
        else if (state.phase === 8) {
            showResults();
        }
    }

    function nextPhase() {
        if (state.phase === 2) {
            state.phase = 3;
            setupGameUI("مرحلة التخمين 🔮", state.p2Name, `هل تعرف ماذا اختار ${state.p1Name}؟ حاول التخمين`);
            showScreen('game');
            renderQuestion(true);
        }
        else if (state.phase === 4) {
            state.phase = 5;
            setupGameUI("وضع السرية 🔒", state.p2Name, "اختر إجابتك الحقيقية بصدق");
            showScreen('game');
            renderQuestion(false);
        }
        else if (state.phase === 6) {
            state.phase = 7;
            setupGameUI("مرحلة التخمين 🔮", state.p1Name, `هل تعرف ماذا اختار ${state.p2Name}؟ حاول التخمين`);
            showScreen('game');
            renderQuestion(true);
        }
    }

    function setupGameUI(mode, player, instruction) {
        ui.modeBadge.textContent = mode;
        ui.modeBadge.style.background = mode.includes("سرية") ? "#6c757d" : "#d63384";
        ui.playerDisplay.textContent = player;
        ui.instruction.textContent = instruction;
    }

    function renderQuestion(isGuessing) {
        const qData = questions[state.currentQuestionIndex];
        ui.questionText.textContent = qData.q;
        ui.optionsContainer.innerHTML = '';

        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => handleOptionClick(index);
            ui.optionsContainer.appendChild(btn);
        });
        
        updateProgress();
    }

    function updateProgress() {
        const totalSteps = questions.length * 4;
        let stepsCompleted = 0;
        if(state.phase === 1) stepsCompleted = state.currentQuestionIndex;
        if(state.phase === 2) stepsCompleted = questions.length;
        if(state.phase === 3) stepsCompleted = questions.length + state.currentQuestionIndex;
        if(state.phase === 4) stepsCompleted = questions.length * 2;
        if(state.phase === 5) stepsCompleted = questions.length * 2 + state.currentQuestionIndex;
        if(state.phase === 6) stepsCompleted = questions.length * 3;
        if(state.phase === 7) stepsCompleted = questions.length * 3 + state.currentQuestionIndex;
        if(state.phase === 8) stepsCompleted = questions.length * 4;

        const pct = (stepsCompleted / totalSteps) * 100;
        ui.progressBar.style.width = `${pct}%`;
    }

    function showResults() {
        showScreen('result');
        
        document.getElementById('resP1Name').textContent = state.p1Name;
        document.getElementById('resP2Name').textContent = state.p2Name;
        
        const maxScore = questions.length * 10;
        
        document.getElementById('resP1Score').textContent = `${state.p1Score} / ${maxScore}`;
        document.getElementById('resP2Score').textContent = `${state.p2Score} / ${maxScore}`;

        let msg = "";
        let icon = "🤝";

        if (state.p1Score > state.p2Score) {
            msg = `💘 ${state.p1Name} الفائز/ة! يبدو أنك تعرف/تعرفين شريكك أفضل من أي شخص آخر.`;
            icon = "👑";
        } else if (state.p2Score > state.p1Score) {
            msg = `💘 ${state.p2Name} الفائز/ة! عيناك لا تخطئان، أنت تعرف/تعرفين كل التفاصيل.`;
            icon = "👑";
        } else {
            msg = "💞 تعادل مثالي! أنتما على نفس الموجة، كأنك تقرآن أفكار بعضكما.";
            icon = "🔗";
        }
        
        ui.winnerIcon.textContent = icon;
        document.getElementById('winnerText').textContent = msg;
    }
</script>

</body>
</html>
