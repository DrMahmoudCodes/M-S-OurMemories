    <style>
        :root {
            --primary-color: #d4af37; /* Gold */
            --secondary-color: #ff9a9de1; /* Soft Cream */
            --bg-color: #fad0c4; /* Light Rose/Cream */
            --text-color: #4a4a4a;
            --accent-color: #e86a6a; /* Soft Red */
            --card-shadow: 0 10px 20px rgba(0,0,0,0.08);
            --hover-shadow: 0 15px 30px rgba(0,0,0,0.15);
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #fff0f0 0%, #fff 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            animation: fadeInDown 1s ease-out;
        }

        header p {
            font-size: 1.1rem;
            color: #777;
            font-style: italic;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        .heart-icon {
            color: var(--accent-color);
            animation: heartbeat 1.5s infinite;
            margin: 0 10px;
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            width: 100%;
        }

        /* Filter Section */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
            animation: fadeIn 1.2s ease-out 0.6s backwards;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--text-color);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 6px 12px rgba(232, 106, 106, 0.3);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            perspective: 1000px;
        }

        /* Photo Card */
        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            position: relative;
            cursor: pointer;
        }

        .photo-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--hover-shadow);
            z-index: 10;
        }

        .image-wrapper {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .photo-card:hover .image-wrapper img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        /* Decorative corner elements */
        .card-content::before {
            content: '❝';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: var(--secondary-color);
            font-family: 'Playfair Display', serif;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 700;
            direction: ltr;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .card-caption {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            font-style: italic;
        }

        /* Modal / Lightbox */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 5px;
            object-fit: contain;
        }

        .modal-info {
            text-align: center;
            margin-top: 1rem;
            width: 100%;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--text-color);
        }

        .modal-caption {
            margin-top: 0.5rem;
            color: #666;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 2rem;
            color: #333;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--accent-color);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background: white;
            margin-top: auto;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9rem;
        }

        /* No Results Message */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #999;
            font-style: italic;
            display: none;
            animation: fadeIn 0.5s;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .filter-container { gap: 0.5rem; }
            .filter-btn { padding: 0.6rem 1rem; font-size: 0.85rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
        }
    </style>
</head>

        // DOM Elements
        const filterContainer = document.getElementById('filter-container');
        const galleryGrid = document.getElementById('gallery-grid');
        const modal = document.getElementById('image-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const noResults = document.getElementById('no-results');

        // Modal Elements
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalDate = document.getElementById('modal-date');
        const modalCaption = document.getElementById('modal-caption');

        // Helper: Extract unique months from dates
        // Format: "Month Year" (e.g., "September 2025")
        function getUniqueMonths(data) {
            const months = new Set();
            data.forEach(photo => {
                const dateObj = new Date(photo.date);
                // Using English locale for sorting, but you can change 'en-US' to 'ar-EG' for Arabic
                const monthYear = dateObj.toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
                months.add(monthYear);
            });
            // Convert Set to Array and sort by date
            return Array.from(months).sort((a, b) => new Date(a) - new Date(b));
        }

        // Initialize Filters
        function initFilters() {
            const months = getUniqueMonths(photos);
            
            // Add "All" button
            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn active';
            allBtn.innerHTML = '<i class="fas fa-th"></i> كل الذكريات';
            allBtn.dataset.filter = 'all';
            filterContainer.appendChild(allBtn);

            // Add month buttons
            months.forEach(month => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerHTML = `<i class="far fa-calendar-alt"></i> ${month}`;
                btn.dataset.filter = month;
                filterContainer.appendChild(btn);
            });

            // Add Event Listeners to buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active class from all
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    // Add active to clicked
                    btn.classList.add('active');
                    // Filter gallery
                    filterGallery(btn.dataset.filter);
                });
            });
        }

        // Render Gallery Items
        function renderGallery(items, append = false) {
            if (!append) galleryGrid.innerHTML = ''; // Clear if not appending (though we redraw on filter)

            if (items.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            items.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                // Determine month for this specific photo
                const photoMonth = new Date(photo.date).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
                
                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${photo.url}" alt="${photo.title}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="card-date">${photo.date}</div>
                        <h3 class="card-title">${photo.title}</h3>
                        <p class="card-caption">${photo.caption}</p>
                    </div>
                `;

                // Click to open modal
                card.addEventListener('click', () => openModal(photo));

                galleryGrid.appendChild(card);

                // Staggered Animation
                setTimeout(() => {
                    card.classList.add('visible');
                }, index * 100); // 100ms delay between each card
            });
        }

        // Filter Logic
        function filterGallery(filterCriteria) {
            // Clear current grid for animation reset
            galleryGrid.innerHTML = '';
            
            let filteredPhotos = photos;

            if (filterCriteria !== 'all') {
                filteredPhotos = photos.filter(photo => {
                    const photoMonth = new Date(photo.date).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
                    return photoMonth === filterCriteria;
                });
            }

            renderGallery(filteredPhotos);
        }

        // Modal Functions
        function openModal(photo) {
            modalImg.src = photo.url;
            modalTitle.innerText = photo.title;
            modalDate.innerText = photo.date;
            modalCaption.innerText = photo.caption;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Event Listeners for Modal
        closeModalBtn.addEventListener('click', closeModal);
        
        // Close when clicking outside content
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
            renderGallery(photos); // Show all initially
        });

  const ua = navigator.userAgent;

  function detectBrowser() {
    if (ua.includes("Chrome") && !ua.includes("Edg")) return "Chrome";
    if (ua.includes("Edg")) return "Edge";
    if (ua.includes("Firefox")) return "Firefox";
    if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
    if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
    return "Unknown";
  }

    if (ua.includes("Linux")) return "Linux";
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
