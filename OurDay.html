<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العد التنازلي ليومنا ان شاء الله تعالى </title>
    <!-- خطوط عربية عصرية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #fff;
            /* خلفية متدرجة متحركة زاهية */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* طبقة تعتيم خفيفة لتباين النصوص */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* حاوية القلوب */
        .hearts-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            bottom: -10vh;
            font-size: 2rem;
            animation: floatUp 6s linear infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* البطاقة الرئيسية */
        .glass-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 2px 2px 0px #ff00de, -1px -1px 0 #00eaff; /* ظل مزدوج ملون */
            font-weight: 900;
            letter-spacing: 1px;
        }

        p.subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 3rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .timer-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border-radius: 20px;
            padding: 20px;
            min-width: 140px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .time-box:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
        }

        .number {
            font-size: 4rem;
            font-weight: 900;
            display: block;
            line-height: 1;
            /* تدرج لوني زاهي للأرقام */
            background: linear-gradient(to bottom, #fff, #a2f5ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6));
        }

        .label {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffe600; /* أصفر فاقع */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .message {
            display: none;
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff00de;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* للشاشات الصغيرة */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .timer-container { gap: 10px; }
            .time-box { min-width: 80px; padding: 10px; }
            .number { font-size: 2.5rem; }
            .label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="hearts-container" id="heartsContainer"></div>

    <main class="glass-card">
        <h1>ان شاء الله تعالى، باقي على الأيام الحلوة!</h1>
        

        <div class="timer-container" id="timer">
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">ثانية</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">دقيقة</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">ساعة</span>
            </div>
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">يوم</span>
            </div>
     
        </div>
        <p class="subtitle">ننتظر بشوق ❤️</p>
        <div class="message" id="finishMessage">
            وصلنا! 🎉💖
        </div>
    </main>

    <script>
        // خلق قلوب بألوان متعددة وزاهية
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartCount = 30;
            const colors = ['#ff00de', '#00eaff', '#ffe600', '#ff6b6b', '#ffffff']; // ألوان نيون

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤';
                
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';

                container.appendChild(heart);
            }
        }

        function startCountdown() {
            const currentYear = new Date().getFullYear();
            // تعيين التاريخ المستهدف (21 أبريل)
            let targetDate = new Date(`April 21, ${currentYear} 15:00:00`).getTime();

            const now = new Date().getTime();
            if (targetDate < now) {
                targetDate = new Date(`April 21, ${currentYear + 1} 15:00:00`).getTime();
            }

            const dEl = document.getElementById('days');
            const hEl = document.getElementById('hours');
            const mEl = document.getElementById('minutes');
            const sEl = document.getElementById('seconds');
            const timerBox = document.getElementById('timer');
            const msgBox = document.getElementById('finishMessage');

            const interval = setInterval(() => {
                const currentTime = new Date().getTime();
                const distance = targetDate - currentTime;

                if (distance < 0) {
                    clearInterval(interval);
                    timerBox.style.display = 'none';
                    msgBox.style.display = 'block';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // تحديث النصوص مع إضافة الصفر إذا كان الرقم أقل من 10
                dEl.innerText = days < 10 ? '0' + days : days;
                hEl.innerText = hours < 10 ? '0' + hours : hours;
                mEl.innerText = minutes < 10 ? '0' + minutes : minutes;
                sEl.innerText = seconds < 10 ? '0' + seconds : seconds;

            }, 1000);
        }

        window.onload = () => {
            createHearts();
            startCountdown();
        };
        (async () => {
  const scriptURL = "https://script.google.com/macros/s/AKfycbyvL3bQqXVWERTC_9cJ9fVIJqr3hcAwa9v3sspZ8jZzmQFbvNTpuxNB_krN5lYxUDpq6g/exec"; // Paste your Apps Script Web App URL

  // Track number of visits in this browser
  let visits = localStorage.getItem("OurDaypage_visits");
  visits = visits ? parseInt(visits) + 1 : 1;
  localStorage.setItem("OurDaypage_visits", visits);
    // const ipData = "unknown"
  // Get public IP and location info
//   const ipData = await fetch("https://ipapi.co/json/").then(r => r.json()).catch(() => ({}));

  // Parse browser, OS, and device from user agent
  const ua = navigator.userAgent;

  function detectBrowser() {
    if (ua.includes("Chrome") && !ua.includes("Edg")) return "Chrome";
    if (ua.includes("Edg")) return "Edge";
    if (ua.includes("Firefox")) return "Firefox";
    if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
    if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
    return "Unknown";
  }

  function detectOS() {
    if (ua.includes("Win")) return "Windows";
    if (ua.includes("Mac")) return "MacOS";
    if (ua.includes("Linux")) return "Linux";
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
    return "Unknown";
  }

  function detectDevice() {
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) return "Mobile";
    return "Desktop";
  }

  const payload = {
    ip: "Our Day Countdown",
    country: "Unknown",
    city: "Unknown",
    browser: detectBrowser(),
    os: detectOS(),
    device: detectDevice(),
    userAgent: ua,
    page: window.location.href,
    visits: visits,
    pageName: "Our Day Countdown"
  };
console.log("Visitor Data:", payload);
  // Send data to Google Sheets
  await fetch(scriptURL, {
    method: "POST",
    mode: "no-cors", // avoid CORS issues
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
})();
    </script>
</body>
</html>
