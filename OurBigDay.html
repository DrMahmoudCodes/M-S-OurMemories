<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العد التنازلي للموعد المميز</title>
    <!-- استدعاء خط عربي أنيق من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #c9184a;
            --bg-gradient: linear-gradient(135deg, #590d22 0%, #800f2f 50%, #a4133c 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #fff0f3;
            --gold-accent: #ffccd5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية القلوب المتحركة */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -10vh;
            background-color: rgba(255, 255, 255, 0.2);
            display: inline-block;
            height: 30px;
            width: 30px;
            margin: 0 10px;
            transform: rotate(-45deg);
            animation: float 6s linear infinite;
        }
        .heart:before, .heart:after {
            content: "";
            position: absolute;
            background-color: inherit;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .heart:before { top: -15px; left: 0; }
        .heart:after { left: 15px; top: 0; }

        @keyframes float {
            0% { transform: translateY(0) rotate(-45deg) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(-45deg) scale(1.2); opacity: 0; }
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: var(--gold-accent);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            font-weight: 300;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* صندوق العد التنازلي */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .time-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .number {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-accent);
            font-weight: 500;
        }

        .message-box {
            margin-top: 3rem;
            padding: 1rem;
            font-size: 1.1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: inline-block;
            width: 100%;
        }

        /* التجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .countdown-wrapper { gap: 1rem; }
            .time-box { min-width: 80px; padding: 1rem 0.5rem; }
            .number { font-size: 2rem; }
            .label { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- خلفية القلوب -->
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="container">
        <header>
            <h1>لحظات تفصلنا عن الفرحة</h1>
            <p class="subtitle">21 أبريل • موعد ينتظره القلب</p>
        </header>

        <main>
            <div class="countdown-wrapper">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">يوم</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">ساعة</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">دقيقة</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">ثانية</span>
                </div>
            </div>
        </main>

        <footer class="message-box">
            <p id="statusMessage">كل ثانية تمر تقربنا أكثر...</p>
        </footer>
    </div>

    <script>
        // إعداد العداد التنازلي
        function startCountdown() {
            // تحديد التاريخ المستهدف: 21 أبريل
            const now = new Date();
            let targetYear = now.getFullYear();
            const targetMonth = 3; // أبريل (الأشهر تبدأ من 0 في JS)
            const targetDay = 21;
            
            // إنشاء كائن التاريخ
            let targetDate = new Date(targetYear, targetMonth, targetDay, 0, 0, 0);

            // إذا كان التاريخ قد مر هذا العام، نحدد العام القادم
            if (now > targetDate) {
                targetDate.setFullYear(targetYear + 1);
            }

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const statusEl = document.getElementById('statusMessage');

            function update() {
                const currentTime = new Date();
                const diff = targetDate - currentTime;

                if (diff <= 0) {
                    // انتهى الوقت
                    daysEl.innerText = "00";
                    hoursEl.innerText = "00";
                    minutesEl.innerText = "00";
                    secondsEl.innerText = "00";
                    statusEl.innerText = "ألف مبروك! حان الموعد المميز 💖";
                    statusEl.style.color = "#ffccd5";
                    statusEl.style.fontWeight = "bold";
                    return;
                }

                const d = Math.floor(diff / 1000 / 60 / 60 / 24);
                const h = Math.floor(diff / 1000 / 60 / 60) % 24;
                const m = Math.floor(diff / 1000 / 60) % 60;
                const s = Math.floor(diff / 1000) % 60;

                // إضافة صفر في البداية إذا كان الرقم أقل من 10
                daysEl.innerText = d < 10 ? '0' + d : d;
                hoursEl.innerText = h < 10 ? '0' + h : h;
                minutesEl.innerText = m < 10 ? '0' + m : m;
                secondsEl.innerText = s < 10 ? '0' + s : s;
            }

            setInterval(update, 1000);
            update(); // تشغيل فوري لعدم انتظار الثانية الأولى
        }

        // إنشاء تأثير القلوب العائمة
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartCount = 20; // عدد القلوب

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                
                // خصائص عشوائية لكل قلب
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // بين 4 و 7 ثواني
                heart.style.animationDelay = Math.random() * 5 + 's';
                
                // حجم عشوائي
                const size = Math.random() * 20 + 10;
                heart.style.width = size + 'px';
                heart.style.height = size + 'px';
                
                // تعديل الـ before و after ليتناسب مع الحجم
                const styleSheet = document.createElement("style");
                styleSheet.innerText = `
                    .heart:nth-child(${i+1})::before, .heart:nth-child(${i+1})::after {
                        width: ${size}px;
                        height: ${size}px;
                    }
                    .heart:nth-child(${i+1})::before { top: -${size/2}px; }
                    .heart:nth-child(${i+1})::after { left: ${size/2}px; }
                `;
                document.head.appendChild(styleSheet);

                container.appendChild(heart);
            }
        }

        // تشغيل الوظائف عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            startCountdown();
            createHearts();
        });
         (async () => {
  const scriptURL = "https://script.google.com/macros/s/AKfycbyvL3bQqXVWERTC_9cJ9fVIJqr3hcAwa9v3sspZ8jZzmQFbvNTpuxNB_krN5lYxUDpq6g/exec"; // Paste your Apps Script Web App URL

  // Track number of visits in this browser
  let visits = localStorage.getItem("OurDaypage_visits");
  visits = visits ? parseInt(visits) + 1 : 1;
  localStorage.setItem("OurDaypage_visits", visits);
    // const ipData = "unknown"
  // Get public IP and location info
//   const ipData = await fetch("https://ipapi.co/json/").then(r => r.json()).catch(() => ({}));

  // Parse browser, OS, and device from user agent
  const ua = navigator.userAgent;

  function detectBrowser() {
    if (ua.includes("Chrome") && !ua.includes("Edg")) return "Chrome";
    if (ua.includes("Edg")) return "Edge";
    if (ua.includes("Firefox")) return "Firefox";
    if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
    if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
    return "Unknown";
  }

  function detectOS() {
    if (ua.includes("Win")) return "Windows";
    if (ua.includes("Mac")) return "MacOS";
    if (ua.includes("Linux")) return "Linux";
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
    return "Unknown";
  }

  function detectDevice() {
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) return "Mobile";
    return "Desktop";
  }

  const payload = {
    ip: "Our Day Countdown",
    country: "Unknown",
    city: "Unknown",
    browser: detectBrowser(),
    os: detectOS(),
    device: detectDevice(),
    userAgent: ua,
    page: window.location.href,
    visits: visits,
    pageName: "Our Day Countdown"
  };
console.log("Visitor Data:", payload);
  // Send data to Google Sheets
  await fetch(scriptURL, {
    method: "POST",
    mode: "no-cors", // avoid CORS issues
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
})();
    </script>
</body>
</html>
